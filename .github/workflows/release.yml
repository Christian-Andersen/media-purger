name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/media-purger

      - name: Rename binary
        run: cp target/x86_64-unknown-linux-musl/release/media-purger media-purger-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: media-purger-linux-x86_64
          name: ${{ github.ref_name }}
          draft: true
